name: Deploy to GitHub Pages

on:
  push:
    branches:
      - AhmedMerge
      - main

# Permisos necesarios para que GitHub Actions pueda desplegar la web
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un despliegue concurrente
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar para Web
        run: flutter build web --release --base-href "/WEB-AUDIOGUIA-TFG/"

      - name: Subir los archivos compilados
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
